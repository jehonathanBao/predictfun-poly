services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: hedger
      POSTGRES_USER: hedger
      POSTGRES_PASSWORD: hedger
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/persistence/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro

  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
